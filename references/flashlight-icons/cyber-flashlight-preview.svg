<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Flashlight Icon Preview</title>
  <desc id="desc">A browser preview sheet showing four minimal flat futuristic flashlight icon drafts.</desc>
  <rect width="960" height="360" fill="#050a0f"/>
  <text x="48" y="48" fill="#e7fbff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Cyber Flashlight Vector Drafts</text>
  <text x="48" y="76" fill="#8dd8df" font-family="Arial, sans-serif" font-size="14">Flat Android vector drawable candidates for the native scanner flashlight button</text>

  <g transform="translate(60 116)">
    <rect width="160" height="160" rx="24" fill="#081017" stroke="#1a5660"/>
    <g transform="translate(32 32)">
